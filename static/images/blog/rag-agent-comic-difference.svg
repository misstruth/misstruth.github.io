<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">漫画风插图：RAG 和 Agent 的角色差异</title>
  <desc id="desc">左边的角色在文档堆里拿着放大镜查资料，代表 RAG。右边的角色拿着工具和任务清单，代表 Agent。</desc>
  <style>
