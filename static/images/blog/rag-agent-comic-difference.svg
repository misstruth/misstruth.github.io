    .text-body { font: 500 26px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #231d18; }
    .text-hand { font: 700 30px "Kaiti SC", "STKaiti", serif; fill: #231d18; }
    .stroke { fill: none; stroke: #231d18; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .soft-stroke { fill: none; stroke: #231d18; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .white { fill: #fffdf8; }
    .mint { fill: #dcefe1; }
    .pink { fill: #f7d8d4; }
    .ink { fill: #231d18; }
  </style>

